name: CI / Docker Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: Jarod
          POSTGRES_PASSWORD: Konijnenberg
          POSTGRES_DB: financialapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U Jarod -d financialapp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


    steps:
      - uses: actions/checkout@v4

      - name: Wait for Postgres to be healthy
        run: |
            until [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker ps -q --filter "ancestor=postgres:18"))" = "healthy" ]; do
              echo "Waiting for Postgres to be healthy..."
              sleep 2
            done

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Maven package
        run: mvn clean verify

      # Docker steps only run on push to master, not PRs
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: babymonitor
          password: IkHaatDocker1!

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag ${{ secrets.DOCKER_USERNAME }}/babymonitor:latest

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/babymonitor:latest
