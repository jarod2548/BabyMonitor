name: CI / Docker Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Maven package
        run: mvn clean verify

      # Docker steps only run on push to master, not PRs
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: BabyMonitor
          password: IkHaatDocker1!

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag ${{ secrets.DOCKER_USERNAME }}/babymonitor:latest

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/babymonitor:latest
